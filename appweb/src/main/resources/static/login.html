<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesion - Plataforma Educativa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, Arial, sans-serif; color: #1e293b;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
      overflow: hidden; position: relative;
      background: linear-gradient(-45deg, #6366f1, #8b5cf6, #ec4899, #6366f1);
      background-size: 400% 400%; animation: gradientMove 16s ease infinite;
    }
    @keyframes gradientMove {
      0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}
    }
    /* burbujas decorativas */
    .blob { position: absolute; border-radius: 50%; filter: blur(60px); opacity: .35; }
    .blob.b1 { width: 320px; height: 320px; background:#c4b5fd; top:-80px; left:-60px; animation: drift1 13s ease-in-out infinite; }
    .blob.b2 { width: 280px; height: 280px; background:#f9a8d4; bottom:-90px; right:-50px; animation: drift2 15s ease-in-out infinite; }
    @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
    @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-40px)} }

    .auth-box {
      position: relative; z-index: 2;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 22px; padding: 38px 34px; width: 100%; max-width: 400px;
      box-shadow: 0 24px 60px -20px rgba(15,23,42,0.45);
      animation: cardIn .7s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes cardIn { from{opacity:0; transform:translateY(40px) scale(.96)} to{opacity:1; transform:none} }

    .logo {
      width: 60px; height: 60px; border-radius: 16px; margin: 0 auto 16px;
      background: linear-gradient(135deg,#6366f1,#ec4899);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; box-shadow: 0 10px 24px -8px rgba(99,102,241,.7);
      animation: pop .6s .2s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes pop { from{transform:scale(0)} to{transform:scale(1)} }

    .auth-box h1 { font-family:'Poppins',sans-serif; font-size: 23px; text-align:center; margin-bottom: 4px; }
    .auth-box p.sub { font-size: 13px; color: #64748b; text-align:center; margin-bottom: 26px; }

    label { display: block; font-size: 13px; color: #475569; font-weight:600; margin-bottom: 7px; margin-top: 16px; }
    input {
      width: 100%; padding: 12px 14px; border: 1.5px solid #e2e8f0;
      border-radius: 12px; font-size: 14px; font-family: inherit; background:#fbfcfe;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    input:focus { outline: none; border-color: #6366f1; background:#fff; box-shadow: 0 0 0 4px rgba(99,102,241,.16); }

    button {
      width: 100%; margin-top: 26px; padding: 13px; border: none; border-radius: 12px;
      background: linear-gradient(135deg,#6366f1,#8b5cf6,#ec4899); background-size:200% auto;
      color: #fff; font-size: 15px; font-weight: 600; font-family:inherit; cursor: pointer;
      box-shadow: 0 12px 26px -10px rgba(99,102,241,.7);
      transition: background-position .5s, transform .15s, box-shadow .25s;
    }
    button:hover { background-position: right center; transform: translateY(-2px); box-shadow: 0 16px 32px -10px rgba(236,72,153,.6); }
    button:active { transform: translateY(0) scale(.98); }

    .link { text-align: center; margin-top: 20px; font-size: 13px; color:#64748b; }
    .link a { color: #6366f1; text-decoration: none; font-weight:600; }
    .link a:hover { text-decoration: underline; }

    .msg { padding: 11px 15px; border-radius: 12px; margin-top: 18px; font-size: 13px; font-weight:500; display: none; }
    .msg.ok    { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; animation: toastIn .4s ease; }
    .msg.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; animation: shake .4s; }
    @keyframes toastIn { from{opacity:0; transform:translateY(-8px)} to{opacity:1; transform:none} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
  </style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>

  <div class="auth-box">
    <div class="logo">🎓</div>
    <h1>Bienvenido</h1>
    <p class="sub">Inicia sesion en la Plataforma Educativa</p>

    <form id="loginForm">
      <label for="username">Usuario</label>
      <input id="username" type="text" placeholder="Tu usuario" required />

      <label for="password">Contrasena</label>
      <input id="password" type="password" placeholder="Tu contrasena" required />

      <button type="submit">Entrar</button>
    </form>

    <div id="msg" class="msg"></div>

    <div class="link">
      No tienes cuenta? <a href="register.html">Registrate aqui</a>
    </div>
  </div>

  <script>
    function mostrarMsg(texto, tipo) {
      const el = document.getElementById('msg');
      el.textContent = texto;
      el.className = 'msg ' + tipo;
      el.style.display = 'block';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const r = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await r.json();

        if (r.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('username', data.username);
          localStorage.setItem('rol', data.rol);
          mostrarMsg('Bienvenido ' + data.username + '. Redirigiendo...', 'ok');
          setTimeout(() => window.location.href = 'index.html', 700);
        } else {
          mostrarMsg(data.error || 'Credenciales invalidas', 'error');
        }
      } catch {
        mostrarMsg('No se pudo conectar con el servidor', 'error');
      }
    });
  </script>
</body>
</html>
