<div class="auth-split">
  <div class="auth-illustration-panel">
    <app-auth-illustration />
  </div>

  <div class="auth-form-panel">
    <div class="auth-form-inner">
      <div class="auth-wordmark">
        <span class="auth-logo-mark">🎓</span>
        <span class="auth-logo-text">Plataforma <strong>Educativa</strong></span>
      </div>

      <h1>La nueva experiencia digital de aprendizaje</h1>
      <p class="auth-tagline">Cercana, dinámica y flexible</p>
      <p class="auth-cta-line">Ingresa tus datos para <strong>iniciar sesión</strong>.</p>

      <form (ngSubmit)="login()" #f="ngForm">
        <label>Usuario</label>
        <div class="auth-input-wrap">
          <input type="text" [(ngModel)]="username" name="username" placeholder="Tu usuario" required />
          <svg class="auth-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </div>

        <label>Contraseña</label>
        <div class="auth-input-wrap">
          <input [type]="mostrarPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" placeholder="Tu contraseña" required />
          <button type="button" class="auth-toggle-pass" (click)="mostrarPassword = !mostrarPassword"
                  [attr.aria-label]="mostrarPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'">
            @if (mostrarPassword) {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.5 18.5 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            } @else {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            }
          </button>
        </div>

        <button type="submit" class="auth-submit"
          [class.auth-submit-ok]="btnEstado === 'ok'"
          [class.auth-submit-err]="btnEstado === 'error'"
          [disabled]="btnEstado === 'cargando'">
          @if (btnEstado === 'cargando') {
            <span class="btn-spinner"></span>Entrando...
          } @else if (btnEstado === 'ok') {
            ✓ Bienvenido!
          } @else if (btnEstado === 'error') {
            ✗ Intenta de nuevo
          } @else {
            Iniciar sesión
          }
        </button>
      </form>

      @if (mensaje) {
        <div class="msg" [class.error]="esError" [class.ok]="!esError">{{ mensaje }}</div>
      }

      <div class="auth-switch">¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></div>
    </div>
  </div>
</div>
